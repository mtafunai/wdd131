<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazy Load</title>
    <meta name="description" content="Michael Tafunai">
    <link rel="stylesheet" href="week04/styles/lazyload.css">
</head>
<body>
    <header>
        <h1>Lazy load</h1>
    </header>

    <main>
        <picture>
            <img src="https://placekitten.com/400/600" alt="placeholder kitten img" loading="lazy">
        </picture>
        <picture>
            <img src="https://placekitten.com/400/700" alt="placeholder kitten img" loading="lazy">
        </picture>
        <picture>
            <img src="https://placekitten.com/400/800" alt="placeholder kitten img" loading="lazy">
        </picture>
        <picture>
            <img src="https://placekitten.com/400/650" alt="placeholder kitten img" loading="lazy">
        </picture>
        <picture>
            <img src="https://placekitten.com/400/750" alt="placeholder kitten img" loading="lazy">
        </picture>
    </main>
</body>
</html>
